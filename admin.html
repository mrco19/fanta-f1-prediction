<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fanta F1 Prediction - Admin</title>

<link rel="stylesheet" href="admin.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="admin-container">

    <aside class="sidebar">

        <h1>🏁 Admin</h1>

        <button class="menu-btn active" data-page="dashboard">
            🏠 Dashboard
        </button>

        <button class="menu-btn" data-page="weekend">
            🏎 Weekend
        </button>

        <button class="menu-btn" data-page="results">
            🏆 Risultati
        </button>

        <button class="menu-btn" data-page="ranking">
            📊 Classifica
        </button>

        <button class="menu-btn" data-page="drivers">
            👥 Piloti
        </button>

        <button class="menu-btn" data-page="settings">
            ⚙️ Impostazioni
        </button>

    </aside>

    <main class="content">

        <!-- DASHBOARD -->

        <section id="dashboard" class="page active">

            <h2>Dashboard</h2>

            <div class="cards">

                <div class="card">

                    <h3>GP Corrente</h3>

                    <p id="currentGP">-</p>

                </div>

                <div class="card">

                    <h3>Round</h3>

                    <p id="currentRound">-</p>

                </div>

                <div class="card">

                    <h3>Weekend</h3>

                    <p id="currentWeekendType">-</p>

                </div>

                <div class="card">

                    <h3>Pronostici</h3>

                    <p id="predictionStatus">-</p>

                </div>

            </div>

        </section>

        <!-- WEEKEND -->

       <section id="weekend" class="page">

<h2>Weekend</h2>

<div class="form-grid">

    <div class="form-group">

        <label>Nome Gran Premio</label>

        <input
            id="gpNameInput"
            type="text">

    </div>

    <div class="form-group">

        <label>Circuito</label>

        <input
            id="gpCircuitInput"
            type="text">

    </div>

    <div class="form-group">

        <label>Nazione</label>

        <input
            id="gpCountryInput"
            type="text">

    </div>

    <div class="form-group">

        <label>Bandiera</label>

        <input
            id="gpFlagInput"
            type="text">

    </div>

    <div class="form-group">

        <label>Round</label>

        <input
            id="gpRoundInput"
            type="number">

    </div>

    <div class="form-group">

        <label>Weekend</label>

        <select id="gpSprintInput">

            <option value="false">
                Weekend Normale
            </option>

            <option value="true">
                Weekend Sprint
            </option>

        </select>

    </div>

    <div class="form-group">

        <label>Data Inizio</label>

        <input
            id="gpStartInput"
            type="datetime-local">

    </div>

    <div class="form-group">

        <label>Data Fine</label>

        <input
            id="gpEndInput"
            type="datetime-local">

    </div>

    <div class="form-group">

        <label>Chiusura Pronostici</label>

        <input
            id="gpCloseInput"
            type="datetime-local">

    </div>

</div>

<div class="admin-actions">

<button id="loadWeekend">

📥 Carica Weekend

</button>

<button id="saveWeekend">

💾 Salva Weekend

</button>

</div>

</section>

        <!-- RISULTATI -->

        <section id="results" class="page">

<h2>Risultati Weekend</h2>

<h3>Qualifiche</h3>

<div id="adminQualifying"></div>

<hr>

<h3>Sprint Qualifying</h3>

<div id="adminSprintQualifying"></div>

<hr>

<h3>Sprint Race</h3>

<div id="adminSprintRace"></div>

<hr>

<h3>Gara</h3>

<div id="adminRace"></div>

<div class="admin-actions">

<button id="loadResults">

📥 Carica Results

</button>

<button id="saveResults">

💾 Salva Results

</button>

</div>

</section>
        <!-- CLASSIFICA -->

        <section id="ranking" class="page">

<h2>Classifica</h2>

<div id="rankingEditor"></div>

<div class="admin-actions">

    <button id="addPlayer">

        ➕ Aggiungi giocatore

    </button>

    <button id="loadRanking">

        📥 Carica Classifica

    </button>

    <button id="saveRanking">

        💾 Salva Classifica

    </button>

</div>

</section>

        <!-- PILOTI -->

        <section id="drivers" class="page">

            <h2>Piloti</h2>

            <p>Qui gestirai l'elenco piloti.</p>

        </section>

          <!-- IMPOSTAZIONI -->

        <section id="settings" class="page">

    <h2>Impostazioni</h2>

    <div class="admin-actions">

        <button id="nextWeekend">
            ⏭️ Passa al prossimo Gran Premio
        </button>

        <button id="generateAll">
            🚀 Genera tutti i JSON
        </button>

    </div>

    <hr>

    <h2>GitHub</h2>

    <div class="admin-card">

        <label>GitHub Personal Access Token</label>

        <input
            type="password"
            id="githubToken"
            placeholder="github_pat_xxxxxxxxxxxxxxxxx">

        <br><br>

        <button id="saveGithubToken">
            💾 Salva Token
        </button>
       
        <button id="testGithub">

            🔍 Test Connessione

       </button>

    </div>

</section>
        
    </main>

</div>

<script src="calendar.js"></script>
<script src="github.js"></script>
<script src="admin.js"></script>

</body>

</html>
