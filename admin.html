<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Fanta F1</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<div class="admin-header">

<div class="admin-logo">
🏎️
</div>

<div>

<h1>FANTAF1 ADMIN</h1>

<p>
Gestione risultati • OpenF1 • JSON
</p>

</div>

</div>

 <div class="admin-grid">

<section class="admin-panel">

<h2>⏱️ Qualifiche</h2>

<div id="admin-quali"></div>

</section>

<section class="admin-panel">

<h2>⚡ Sprint Qualifying</h2>

<div id="admin-sprintquali"></div>

</section>

<section class="admin-panel">

<h2>🏎️ Sprint Race</h2>

<div id="admin-sprint"></div>

</section>

<section class="admin-panel">

<h2>🏁 Gara</h2>

<div id="admin-race"></div>

</section>

</div>

<br>
  
<div id="quali-results"></div>
<div id="sprintquali-results"></div>
<div id="sprint-results"></div>
<div id="race-results"></div>

<h2 class="section-title">
⚙️ Azioni OpenF1
</h2>

<div class="cards-grid">

<button id="loadQuali" class="admin-card blue-card">

<img
src="images/quali-blue.png"
class="card-image"
alt="Qualifiche">

<h3>QUALIFICHE</h3>

<p>Carica da OpenF1</p>

</button>

<button id="loadSprintQuali" class="admin-card purple-card">

<img
src="images/sprintquali-purple.png"
class="card-image"
alt="Sprint Qualifying">

<h3>SPRINT QUALIFYING</h3>

<p>Carica da OpenF1</p>

</button>

<button id="loadSprint" class="admin-card green-card">

<img
src="images/sprint-green.png"
class="card-image"
alt="Sprint">

<h3>SPRINT RACE</h3>

<p>Carica da OpenF1</p>

</button>

<button id="loadRace" class="admin-card red-card">

<img
src="images/race-red.png"
class="card-image"
alt="Race">

<h3>GARA</h3>

<p>Carica da OpenF1</p>

</button>

</div>

<div class="json-actions">

<button id="generateJson">
📄 Genera JSON
</button>

<button id="copyJson">
📋 Copia
</button>

<button id="downloadJson">
💾 Scarica
</button>

</div>

<br><br>

 <h2 class="section-title">
📄 JSON risultati
</h2>
 
<div class="json-box">

<textarea
id="jsonOutput"
placeholder="Premi 'Genera JSON'..."
></textarea>

</div>

<footer class="admin-footer">

<div class="footer-left">

🏎️ FantaF1 Admin

</div>

<div class="footer-center">

OpenF1 API

</div>

<div class="footer-right">

Versione 1.0

</div>

</footer>
 
<script src="admin.js"></script>

</div>

</body>
</html>
