<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Fanta F1</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<div class="admin-header">

<div class="admin-logo">
🏎️
</div>

<div>

<h1>FANTAF1 ADMIN</h1>

<p>
Gestione risultati • OpenF1 • JSON
</p>

</div>

</div>

 <div class="admin-grid">

<section class="admin-panel">

<h2>⏱️ Qualifiche</h2>

<div id="admin-quali"></div>

</section>

<section class="admin-panel">

<h2>⚡ Sprint Qualifying</h2>

<div id="admin-sprintquali"></div>

</section>

<section class="admin-panel">

<h2>🏎️ Sprint Race</h2>

<div id="admin-sprint"></div>

</section>

<section class="admin-panel">

<h2>🏁 Gara</h2>

<div id="admin-race"></div>

</section>

</div>

<br>
  
<div id="quali-results"></div>
<div id="sprintquali-results"></div>
<div id="sprint-results"></div>
<div id="race-results"></div>

 <h2 class="section-title">
⚙️ Azioni OpenF1
</h2>
 
  <div class="action-grid">

<button id="loadQuali" class="action-card blue">

<span>⏱️</span>

<strong>QUALIFICHE</strong>

<small>OpenF1</small>

</button>

<button id="loadSprintQuali" class="action-card purple">

<span>⚡</span>

<strong>SPRINT QUALI</strong>

<small>OpenF1</small>

</button>

<button id="loadSprint" class="action-card green">

<span>🏎️</span>

<strong>SPRINT</strong>

<small>OpenF1</small>

</button>

<button id="loadRace" class="admin-card race-card">

<div class="card-icon">
🏁
</div>

<div class="card-text">

<h3>CARICA GARA</h3>

<p>da OpenF1</p>

</div>

<div class="card-car">
🏎️
</div>

</button>

<div class="json-actions">

<button id="generateJson">
📄 Genera JSON
</button>

<button id="copyJson">
📋 Copia
</button>

<button id="downloadJson">
💾 Scarica
</button>

</div>

</div>

<br><br>

 <h2 class="section-title">
📄 JSON risultati
</h2>
 
<div class="json-box">

<textarea
id="jsonOutput"
placeholder="Premi 'Genera JSON'..."
></textarea>

</div>

<footer class="admin-footer">

<div class="footer-left">

🏎️ FantaF1 Admin

</div>

<div class="footer-center">

OpenF1 API

</div>

<div class="footer-right">

Versione 1.0

</div>

</footer>
 
<script src="admin.js"></script>

</div>

</body>
</html>
